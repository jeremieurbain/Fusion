<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FUSION</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
cursor:none;
font-family:'Inter', sans-serif;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* NAV */
.nav{
position:fixed;
width:100%;
padding:25px 40px;
display:flex;
justify-content:space-between;
z-index:100;
background:linear-gradient(180deg, rgba(0,0,0,.9), transparent);
}

.logo{
font-size:28px;
letter-spacing:6px;
font-weight:600;
}

.menu{
display:flex;
gap:30px;
font-size:14px;
letter-spacing:2px;
}

/* FILM GRID */
.container{
padding-top:140px;
width:80%;
margin:auto;
}

.film{
font-size:64px;
padding:25px 0;
border-bottom:1px solid rgba(255,255,255,.15);
position:relative;
transition:.3s;
}

.film:hover{
color:#aaa;
}

.preview{
position:fixed;
width:420px;
pointer-events:none;
opacity:0;
transform:scale(.9);
transition:.25s;
z-index:50;
}

.preview img{
width:100%;
border-radius:8px;
}

/* CUSTOM CURSOR */
.cursor{
width:70px;
height:70px;
border:1px solid white;
border-radius:100px;
position:fixed;
pointer-events:none;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
letter-spacing:2px;
transition: transform .15s ease;
z-index:200;
}

.cursor span{
opacity:.8;
}

.film:hover ~ .cursor{
transform:scale(1.4);
}

/* HERO */
.hero{
height:60vh;
display:flex;
align-items:center;
justify-content:center;
font-size:120px;
letter-spacing:20px;
font-weight:600;
}

.footer{
padding:80px;
text-align:center;
color:#777;
font-size:13px;
letter-spacing:3px;
}

</style>
</head>

<body>

<div class="nav">
<div class="logo">FUSION</div>
<div class="menu">
<div>PROJECTS</div>
<div>ABOUT</div>
<div>CONTACT</div>
</div>
</div>

<div class="hero">FUSION</div>

<div class="container">

<div class="film" data-img="https://picsum.photos/600/800?1">PROJECT ORION</div>
<div class="film" data-img="https://picsum.photos/600/800?2">MIDNIGHT SIGNAL</div>
<div class="film" data-img="https://picsum.photos/600/800?3">GLASS CITY</div>
<div class="film" data-img="https://picsum.photos/600/800?4">ECHO DIVIDE</div>
<div class="film" data-img="https://picsum.photos/600/800?5">LAST TRANSMISSION</div>

</div>

<div class="preview" id="preview">
<img src="">
</div>

<div class="cursor" id="cursor">
<span>VIEW</span>
</div>

<div class="footer">
FUSION PRODUCTION COMPANY
</div>

<script>
const preview = document.getElementById("preview");
const previewImg = preview.querySelector("img");

const films = document.querySelectorAll(".film");

films.forEach(film=>{

film.addEventListener("mouseenter", e=>{
preview.style.opacity = 1;
previewImg.src = film.dataset.img;
});

film.addEventListener("mouseleave", e=>{
preview.style.opacity = 0;
});

film.addEventListener("mousemove", e=>{
preview.style.left = e.clientX + 40 + "px";
preview.style.top = e.clientY - 200 + "px";
});

});

/* CURSOR */
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e=>{
cursor.style.left = e.clientX - 35 + "px";
cursor.style.top = e.clientY - 35 + "px";
});

</script>

</body>
</html>
