<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FUSION</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter', sans-serif;
}

body{
background:black;
color:white;
overflow-x:hidden;
cursor:none; /* hide default cursor */
}

/* NAV */
.nav{
position:fixed;
width:100%;
padding:25px 40px;
display:flex;
justify-content:space-between;
z-index:100;
background:linear-gradient(180deg, rgba(0,0,0,.95), transparent);
}

.logo{
font-size:28px;
letter-spacing:6px;
font-weight:600;
}

.menu{
display:flex;
gap:30px;
font-size:14px;
letter-spacing:2px;
}

/* HERO */
.hero{
height:60vh;
display:flex;
align-items:center;
justify-content:center;
font-size:110px;
letter-spacing:20px;
font-weight:600;
}

/* FILMS */
.container{
padding-top:40px;
width:75%;
margin:auto;
}

.film{
font-size:64px;
padding:30px 0;
border-bottom:1px solid rgba(255,255,255,.15);
position:relative;
transition:.25s;
}

.film:hover{
color:#9f9f9f;
}

/* PREVIEW */
.preview{
position:fixed;
width:380px;
pointer-events:none;
opacity:0;
transform:scale(.95);
transition:opacity .2s, transform .2s;
z-index:90;
}

.preview img{
width:100%;
border-radius:6px;
}

/* CURSOR */
.cursor{
width:80px;
height:80px;
border:1px solid white;
border-radius:100px;
position:fixed;
pointer-events:none;
display:flex;
align-items:center;
justify-content:center;
font-size:11px;
letter-spacing:2px;
z-index:200;
transition:transform .15s ease, background .2s;
}

.cursor.active{
transform:scale(1.5);
background:rgba(255,255,255,.08);
}

.footer{
padding:80px;
text-align:center;
color:#666;
font-size:12px;
letter-spacing:3px;
}

/* MOBILE */
@media(max-width:900px){

body{
cursor:default;
}

.cursor{
display:none;
}

.film{
font-size:36px;
}

.preview{
display:none;
}

.hero{
font-size:60px;
}

}

</style>
</head>

<body>

<div class="nav">
<div class="logo">FUSION</div>

<div class="menu">
<div>PROJECTS</div>
<div>ABOUT</div>
<div>CONTACT</div>
</div>

</div>

<div class="hero">FUSION</div>

<div class="container">

<div class="film" data-img="https://picsum.photos/600/800?1">PROJECT ORION</div>
<div class="film" data-img="https://picsum.photos/600/800?2">MIDNIGHT SIGNAL</div>
<div class="film" data-img="https://picsum.photos/600/800?3">GLASS CITY</div>
<div class="film" data-img="https://picsum.photos/600/800?4">ECHO DIVIDE</div>
<div class="film" data-img="https://picsum.photos/600/800?5">LAST TRANSMISSION</div>

</div>

<div class="preview" id="preview">
<img src="">
</div>

<div class="cursor" id="cursor">
<span>VIEW</span>
</div>

<div class="footer">
FUSION PRODUCTION COMPANY
</div>

<script>

const preview = document.getElementById("preview");
const previewImg = preview.querySelector("img");
const films = document.querySelectorAll(".film");
const cursor = document.getElementById("cursor");

films.forEach(film=>{

film.addEventListener("mouseenter", ()=>{
preview.style.opacity = 1;
preview.style.transform = "scale(1)";
previewImg.src = film.dataset.img;

cursor.classList.add("active");
});

film.addEventListener("mouseleave", ()=>{
preview.style.opacity = 0;
preview.style.transform = "scale(.95)";

cursor.classList.remove("active");
});

film.addEventListener("mousemove", e=>{
preview.style.left = (e.clientX + 30) + "px";
preview.style.top = (e.clientY - 220) + "px";
});

});

/* CURSOR MOVEMENT */
document.addEventListener("mousemove", e=>{
cursor.style.left = (e.clientX - 40) + "px";
cursor.style.top = (e.clientY - 40) + "px";
});

</script>

</body>
</html>
